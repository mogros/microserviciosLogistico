<div class="page-container" style="max-width:700px;">
  <a routerLink="/clientes" class="btn btn-outline-secondary mb-3"><i class="bi bi-arrow-left me-1"></i>Volver</a>
  <div class="card-custom">
    <h4 class="fw-bold mb-4">{{ titulo }}</h4>
    <form #f="ngForm" (ngSubmit)="f.valid && guardar()">
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label fw-semibold">Nombre *</label><input [(ngModel)]="model.nombre" name="nombre" required class="form-control"></div>
        <div class="col-md-6"><label class="form-label fw-semibold">Apellido</label><input [(ngModel)]="model.apellido" name="apellido" class="form-control"></div>
        <div class="col-md-6"><label class="form-label fw-semibold">RUC / DNI *</label><input [(ngModel)]="model.ruc" name="ruc" required class="form-control" [class.is-invalid]="error.ruc"><div class="invalid-feedback">{{ error.ruc }}</div></div>
        <div class="col-md-6"><label class="form-label fw-semibold">Email</label><input [(ngModel)]="model.email" name="email" type="email" class="form-control"></div>
        <div class="col-md-6"><label class="form-label fw-semibold">Teléfono</label><input [(ngModel)]="model.telefono" name="telefono" class="form-control"></div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Límite de Crédito (S/)</label>
          <input [(ngModel)]="model.limiteCredito" name="limiteCredito" type="number" step="0.01" min="0" class="form-control">
        </div>
        <div class="col-12"><label class="form-label fw-semibold">Dirección</label><textarea [(ngModel)]="model.direccion" name="direccion" class="form-control" rows="2"></textarea></div>
        <div class="col-12">
          <div class="alert alert-info py-2" style="font-size:13px;">
            <i class="bi bi-info-circle me-1"></i>
            <strong>Criterios automáticos:</strong> Regular &lt; S/5,000 | Premium ≥ S/5,000 | VIP ≥ S/10,000 (basado en compras acumuladas)
          </div>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn-primary-custom" [disabled]="f.invalid"><i class="bi bi-check2 me-1"></i>{{ model.id ? "Actualizar" : "Guardar" }}</button>
        <a routerLink="/clientes" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
