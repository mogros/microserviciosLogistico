<div class="page-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0"><i class="bi bi-people me-2"></i>Clientes</h2>
    <a routerLink="/clientes/form" class="btn-primary-custom"><i class="bi bi-plus-lg me-1"></i>Nuevo Cliente</a>
  </div>
  <div class="card-custom">
    <div *ngIf="cargando" class="text-center py-4"><div class="spinner-border text-primary"></div></div>
    <div *ngIf="lista.length === 0 && !cargando" class="alert alert-info">No hay clientes registrados.</div>
    <div class="table-responsive" *ngIf="lista.length > 0">
      <table class="table table-hover align-middle">
        <thead class="table-light"><tr><th>ID</th><th>Nombre</th><th>RUC</th><th>Email</th><th>Tipo</th><th>Compras Acum.</th><th>Límite Créd.</th><th>Acciones</th></tr></thead>
        <tbody>
          <tr *ngFor="let c of lista">
            <td>{{ c.id }}</td>
            <td class="fw-semibold">{{ c.nombre }} {{ c.apellido }}</td>
            <td>{{ c.ruc }}</td>
            <td>{{ c.email }}</td>
            <td><span [class]="badgeClase(c.tipo!)">{{ c.tipo }}</span></td>
            <td>S/ {{ c.totalComprasAcumuladas | number:"1.2-2" }}</td>
            <td>S/ {{ c.limiteCredito | number:"1.2-2" }}</td>
            <td>
              <a [routerLink]="['/clientes/form', c.id]" class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-pencil"></i></a>
              <button class="btn btn-sm btn-outline-danger" (click)="eliminar(c)"><i class="bi bi-trash"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
