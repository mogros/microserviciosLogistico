<div class="page-container" style="max-width:700px;">
  <a routerLink="/productos" class="btn btn-outline-secondary mb-3"><i class="bi bi-arrow-left me-1"></i>Volver</a>
  <div class="card-custom">
    <h4 class="fw-bold mb-4">{{ titulo }}</h4>
    <form #f="ngForm" (ngSubmit)="f.valid && guardar()">
      <div class="row g-3">

        <div class="col-12">
          <label class="form-label fw-semibold">Nombre *</label>
          <input [(ngModel)]="model.nombre" name="nombre" required
                 class="form-control" [class.is-invalid]="error.nombre">
          <div class="invalid-feedback">{{ error.nombre }}</div>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Descripción</label>
          <textarea [(ngModel)]="model.descripcion" name="descripcion"
                    class="form-control" rows="2"></textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Categoría</label>
          <!-- compareWith resuelve el problema de comparación por referencia de objetos -->
          <select [(ngModel)]="model.categoria" name="categoria"
                  [compareWith]="compararCategorias" class="form-select">
            <option [ngValue]="null">Sin categoría</option>
            <option *ngFor="let c of categorias" [ngValue]="c">{{ c.nombre }}</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Unidad de Medida</label>
          <input [(ngModel)]="model.unidadMedida" name="unidadMedida"
                 class="form-control" placeholder="Ej: Und, Kg, Lt">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Precio Venta (S/) *</label>
          <input [(ngModel)]="model.precioVenta" name="precioVenta"
                 type="number" step="0.01" required min="0" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Precio Compra (S/) *</label>
          <input [(ngModel)]="model.precioCompra" name="precioCompra"
                 type="number" step="0.01" required min="0" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Stock</label>
          <input [(ngModel)]="model.stock" name="stock"
                 type="number" min="0" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">
            Punto de Reorden
            <small class="text-muted">(alerta bajo stock)</small>
          </label>
          <input [(ngModel)]="model.puntoReorden" name="puntoReorden"
                 type="number" min="0" class="form-control">
        </div>

        <div class="col-12 d-flex align-items-center">
          <div class="form-check">
            <input [(ngModel)]="model.activo" name="activo"
                   type="checkbox" class="form-check-input" id="activo">
            <label class="form-check-label fw-semibold" for="activo">Activo</label>
          </div>
        </div>

      </div>

      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn-primary-custom" [disabled]="f.invalid">
          <i class="bi bi-check2 me-1"></i>{{ model.id ? "Actualizar" : "Guardar" }}
        </button>
        <a routerLink="/productos" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
