<div class="page-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0"><i class="bi bi-building me-2"></i>Proveedores</h2>
    <div class="d-flex gap-2">
      <a routerLink="/cotizaciones" class="btn btn-outline-primary"><i class="bi bi-file-text me-1"></i>Cotizaciones</a>
      <a routerLink="/proveedores/form" class="btn-primary-custom"><i class="bi bi-plus-lg me-1"></i>Nuevo</a>
    </div>
  </div>
  <div class="card-custom">
    <div *ngIf="cargando" class="text-center py-4"><div class="spinner-border text-primary"></div></div>
    <div *ngIf="lista.length === 0 && !cargando" class="alert alert-info">Sin proveedores registrados.</div>
    <div class="table-responsive" *ngIf="lista.length > 0">
      <table class="table table-hover align-middle">
        <thead class="table-light"><tr><th>ID</th><th>Razón Social</th><th>RUC</th><th>Teléfono</th><th>Email</th><th>Contacto</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>
          <tr *ngFor="let p of lista">
            <td>{{ p.id }}</td><td class="fw-semibold">{{ p.razonSocial }}</td><td>{{ p.ruc }}</td>
            <td>{{ p.telefono }}</td><td>{{ p.email }}</td><td>{{ p.contacto }}</td>
            <td><span [class]="p.activo ? 'badge-pagado' : 'badge-vencido'">{{ p.activo ? "Activo" : "Inactivo" }}</span></td>
            <td>
              <a [routerLink]="['/proveedores/form', p.id]" class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-pencil"></i></a>
              <button class="btn btn-sm btn-outline-danger" (click)="eliminar(p)"><i class="bi bi-trash"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
