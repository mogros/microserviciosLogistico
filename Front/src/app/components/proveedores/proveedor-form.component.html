<div class="page-container" style="max-width:700px;">
  <a routerLink="/proveedores" class="btn btn-outline-secondary mb-3"><i class="bi bi-arrow-left me-1"></i>Volver</a>
  <div class="card-custom">
    <h4 class="fw-bold mb-4">{{ titulo }}</h4>
    <form #f="ngForm" (ngSubmit)="f.valid && guardar()">
      <div class="row g-3">
        <div class="col-md-8"><label class="form-label fw-semibold">Razón Social *</label><input [(ngModel)]="model.razonSocial" name="razonSocial" required class="form-control"></div>
        <div class="col-md-4"><label class="form-label fw-semibold">RUC *</label><input [(ngModel)]="model.ruc" name="ruc" required class="form-control" [class.is-invalid]="error.ruc"><div class="invalid-feedback">{{ error.ruc }}</div></div>
        <div class="col-md-6"><label class="form-label fw-semibold">Teléfono</label><input [(ngModel)]="model.telefono" name="telefono" class="form-control"></div>
        <div class="col-md-6"><label class="form-label fw-semibold">Email</label><input [(ngModel)]="model.email" name="email" type="email" class="form-control"></div>
        <div class="col-md-6"><label class="form-label fw-semibold">Contacto</label><input [(ngModel)]="model.contacto" name="contacto" class="form-control"></div>
        <div class="col-12"><label class="form-label fw-semibold">Dirección</label><textarea [(ngModel)]="model.direccion" name="direccion" class="form-control" rows="2"></textarea></div>
        <div class="col-12 d-flex align-items-center"><div class="form-check"><input [(ngModel)]="model.activo" name="activo" type="checkbox" class="form-check-input" id="activo"><label class="form-check-label fw-semibold" for="activo">Activo</label></div></div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn-primary-custom" [disabled]="f.invalid"><i class="bi bi-check2 me-1"></i>{{ model.id ? "Actualizar" : "Guardar" }}</button>
        <a routerLink="/proveedores" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
